{% extends 'base.html' %}
{% block body %}

<head>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime&display=swap');
        body {
          margin: 0px;
          padding: 0px;
          font-family: "Courier Prime", monospace;
          background-color: #fdfdfe;
        }
        header {
          width: 100%;
          justify-content: center;
          align-items: top;
          margin: 0;
        }
        
        header h1 {
          font-size: 50px;
          font-weight: 500;
          color: #553c9a;
          border-right: 4px solid #000;
          animation: cursor 1s infinite step-end, typing 15s infinite steps(23);
          white-space: nowrap;
          overflow: hidden;
          
        }
        
        .boxb{
            margin: auto;
            width: 50%;
            padding: 10px;
            border: 3px dashed black;
        }
        .row::after{
            display: table;
            clear: both;
        }
        .column{
            float: left;
            width: 50%;
            padding: 5px;
        }
        
    </style>
</head>

<div class="boxb">
    <header>
    <h1>Image Emotion Detection</h1>
    </header>
    <hr>
    
    <h2 style="color:red ;text-align: center;">Predicted Emotion : {{data}} </h2>
</div>


{% endblock body %}
